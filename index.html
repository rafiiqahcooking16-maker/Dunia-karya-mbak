<!DOCTYPE html>
<html>
<head>
  <title>Dunia Karya Mbak ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #e1bee7, #f3e5f5);
      margin: 0;
    }

    header {
      background: linear-gradient(to right, purple, #ab47bc);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
    }

    nav {
      padding: 10px;
      text-align: center;
    }

    nav input {
      padding: 10px;
      width: 70%;
      border-radius: 20px;
      border: none;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .box {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .box:hover {
      transform: scale(1.03);
    }

    .btn {
      background: linear-gradient(to right, purple, #ab47bc);
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      margin-top: 10px;
    }

    .ebook {
      display: none;
      background: white;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      padding: 20px;
    }

    .comment-box input {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
    }

    .comment-box textarea {
      width: 100%;
      height: 60px;
      margin-top: 10px;
    }

    .comment {
      background: #f3e5f5;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
🌟 Dunia Karya Mbak ✨ 🌟
</header>

<nav>
  <input type="text" id="search" placeholder="Cari ebook..." onkeyup="cari()">
</nav>
<div style="background: white; margin: 20px; padding: 20px; border-radius: 15px;">
  <h3>📘 Buku Besar Bisnis Cilik</h3>
  <p>Belajar jualan dari nol sampai level sultan 💜</p>

  <a href="bukubesar.html">
    <button style="background: purple; color: white; padding: 10px 20px; border: none; border-radius: 10px;">
      Baca
    </button>
  </a>
</div>
<div id="listEbook"
<div id="listEbook">

  <div class="ebook">
    <h2>📘 Buku Besar Bisnis Cilik</h2>
    <p>Belajar Jualan dari Nol Sampai Level Sultan 💜</p>

    <a href="bukubesar.html">
      <button class="btn">Baca</button>
    </a>
  </div>


</div>

</div>

<div id="buku1" class="ebook">
  <h2>📘 50 Ide Jualan</h2>

  <p>Ini isi ebook Mbak 💜✨</p>

  <button class="btn" onclick="tutup('buku1')">Tutup</button>

  <div class="comment-box">
    <h3>Komentar 💬</h3>

    <input type="text" id="nama" placeholder="Nama kamu">
    <textarea id="inputKomentar" placeholder="Tulis komentar..."></textarea>
    <button class="btn" onclick="tambahKomentar()">Kirim</button>

    <div id="daftarKomentar"></div>
  </div>
</div>

<script>
function buka(id) {
  document.getElementById(id).style.display = "block";
}

function tutup(id) {
  document.getElementById(id).style.display = "none";
}

function cari() {
  let input = document.getElementById("search").value.toLowerCase();
  let items = document.getElementsByClassName("ebook-item");

  for (let i = 0; i < items.length; i++) {
    let text = items[i].innerText.toLowerCase();
    items[i].style.display = text.includes(input) ? "" : "none";
  }
}

function tambahKomentar() {
  let nama = document.getElementById("nama").value;
  let isi = document.getElementById("inputKomentar").value;
  let daftar = document.getElementById("daftarKomentar");

  if(nama !== "" && isi !== "") {
    let div = document.createElement("div");
    div.className = "comment";
    div.innerText = nama + ": " + isi;
    daftar.appendChild(div);
  }
}
</script>

</body>
</html>
